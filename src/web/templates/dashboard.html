<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=SF+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        :root {
            --bg: #000000;
            --bg-raised: #0a0a0a;
            --bg-card: #111111;
            --bg-card-hover: #161616;
            --bg-subtle: #0d0d0d;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.1);
            --text-primary: #f5f5f7;
            --text-secondary: rgba(255,255,255,0.55);
            --text-tertiary: rgba(255,255,255,0.3);
            --accent: #0a84ff;
            --accent-soft: rgba(10,132,255,0.12);
            --green: #30d158;
            --green-soft: rgba(48,209,88,0.12);
            --red: #ff453a;
            --red-soft: rgba(255,69,58,0.12);
            --orange: #ff9f0a;
            --orange-soft: rgba(255,159,10,0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }

        /* ---- Top nav ---- */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            background: rgba(0,0,0,0.72);
            border-bottom: 1px solid var(--border);
        }
        .topbar-inner {
            max-width: 1320px;
            margin: 0 auto;
            padding: 0 32px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-primary);
        }
        .logo span {
            color: var(--text-tertiary);
            font-weight: 400;
            margin-left: 8px;
        }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .topbar-status {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-right: 12px;
        }
        .topbar-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            margin-right: 6px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ---- Buttons ---- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 980px;
            border: none;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
        }
        .btn:hover { background: rgba(255,255,255,0.14); }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
        .btn-accent {
            background: var(--accent);
            color: #fff;
        }
        .btn-accent:hover { background: #0070e0; }
        .btn svg { width: 14px; height: 14px; }

        /* ---- Layout ---- */
        .container {
            max-width: 1320px;
            margin: 0 auto;
            padding: 28px 32px 64px;
        }

        /* ---- Hero metrics ---- */
        .hero {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 24px;
        }
        .hero-card {
            background: var(--bg-card);
            padding: 24px 28px;
            transition: background 0.2s;
        }
        .hero-card:hover { background: var(--bg-card-hover); }
        .hero-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .hero-value {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }
        .hero-sub {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* ---- Cards ---- */
        .section { margin-bottom: 24px; }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 0 4px;
        }
        .section-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--border-hover); }
        .card-body { padding: 24px; }

        /* ---- Grid layouts ---- */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        /* ---- Stat pairs (inside cards) ---- */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 32px;
        }
        .stat { }
        .stat-label {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        /* ---- Tables ---- */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead th {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-subtle);
            position: sticky;
            top: 0;
        }
        thead th:first-child { padding-left: 24px; }
        thead th:last-child { padding-right: 24px; text-align: right; }
        tbody td {
            font-size: 13px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }
        tbody td:first-child { padding-left: 24px; }
        tbody td:last-child { padding-right: 24px; text-align: right; }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: rgba(255,255,255,0.02); }
        tbody tr:last-child td { border-bottom: none; }
        .cell-ticker {
            font-weight: 600;
            color: var(--text-primary);
        }
        .cell-mono {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
        }

        /* ---- Badges ---- */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 980px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .badge-pass { background: var(--green-soft); color: var(--green); }
        .badge-no { background: rgba(255,255,255,0.05); color: var(--text-tertiary); }
        .badge-open { background: var(--accent-soft); color: var(--accent); }
        .badge-won { background: var(--green-soft); color: var(--green); }
        .badge-lost, .badge-stopped { background: var(--red-soft); color: var(--red); }
        .badge-filtered { background: rgba(255,255,255,0.04); color: var(--text-tertiary); }
        .badge-expired { background: var(--orange-soft); color: var(--orange); }
        .badge-long { background: var(--green-soft); color: var(--green); }
        .badge-short { background: var(--red-soft); color: var(--red); }

        /* ---- Colors ---- */
        .c-green { color: var(--green); }
        .c-red { color: var(--red); }
        .c-orange { color: var(--orange); }
        .c-muted { color: var(--text-tertiary); }
        .c-primary { color: var(--text-primary); }

        /* ---- Chart ---- */
        .chart-wrap {
            padding: 20px 24px 16px;
            height: 300px;
            position: relative;
        }
        .chart-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-tertiary);
            font-size: 14px;
        }

        /* ---- Scheduler pills ---- */
        .scheduler-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding: 20px 24px;
        }
        .sched-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            flex: 1;
            min-width: 200px;
        }
        .sched-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0;
        }
        .sched-info { }
        .sched-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .sched-next {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        /* ---- Filter validation card ---- */
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }
        .filter-stat {
            background: var(--bg-card);
            padding: 16px 20px;
            text-align: center;
        }
        .filter-stat-value {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .filter-stat-label {
            font-size: 11px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* ---- Empty states ---- */
        .empty {
            padding: 48px 24px;
            text-align: center;
            color: var(--text-tertiary);
            font-size: 14px;
        }
        .empty-icon {
            font-size: 32px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        /* ---- Responsive ---- */
        @media (max-width: 960px) {
            .hero { grid-template-columns: 1fr 1fr; }
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .container { padding: 20px 16px 48px; }
            .topbar-inner { padding: 0 16px; }
            .filter-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .hero { grid-template-columns: 1fr; }
            .hero-value { font-size: 24px; }
            .stats-grid { grid-template-columns: 1fr; }
        }

        /* ---- Loading shimmer ---- */
        .loading {
            background: linear-gradient(90deg, var(--bg-card) 25%, rgba(255,255,255,0.04) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-sm);
            height: 120px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ---- Scrollbar ---- */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<!-- Top bar -->
<nav class="topbar">
    <div class="topbar-inner">
        <div class="logo">Phantom <span>Signal Validator</span></div>
        <div class="topbar-actions">
            <span class="topbar-status">
                <span class="topbar-dot"></span>
                <span id="lastRefresh">Live</span>
            </span>
            <button class="btn" onclick="triggerSettle()" id="settleBtn">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8h12M8 2v12"/></svg>
                Settle
            </button>
            <button class="btn btn-accent" onclick="triggerScan()" id="scanBtn">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>
                Scan Now
            </button>
        </div>
    </div>
</nav>

<div class="container">

    <!-- Hero KPIs -->
    <div class="hero" id="heroSection">
        <div class="hero-card">
            <div class="hero-label">Bankroll</div>
            <div class="hero-value" id="heroBankroll">--</div>
            <div class="hero-sub" id="heroBankrollSub"></div>
        </div>
        <div class="hero-card">
            <div class="hero-label">Total P&L</div>
            <div class="hero-value" id="heroPnl">--</div>
            <div class="hero-sub" id="heroPnlSub"></div>
        </div>
        <div class="hero-card">
            <div class="hero-label">Win Rate</div>
            <div class="hero-value" id="heroWinRate">--</div>
            <div class="hero-sub" id="heroWinRateSub"></div>
        </div>
        <div class="hero-card">
            <div class="hero-label">Signals</div>
            <div class="hero-value" id="heroSignals">--</div>
            <div class="hero-sub" id="heroSignalsSub"></div>
        </div>
    </div>

    <!-- Equity Curve -->
    <div class="section">
        <div class="section-header">
            <span class="section-title">Performance</span>
        </div>
        <div class="card">
            <div class="chart-wrap">
                <canvas id="equityChart"></canvas>
            </div>
            <div class="chart-empty" id="chartEmpty" style="display:none">
                Equity curve will appear after trades are settled
            </div>
        </div>
    </div>

    <!-- Strategy + Portfolio row -->
    <div class="grid-2 section">
        <!-- Strategy Breakdown -->
        <div>
            <div class="section-header">
                <span class="section-title">Strategies</span>
            </div>
            <div class="card" id="strategiesCard">
                <div id="strategies" class="loading"></div>
            </div>
        </div>

        <!-- Portfolio & Filter Validation -->
        <div>
            <div class="section-header">
                <span class="section-title">Portfolio</span>
            </div>
            <div class="card">
                <div class="card-body" id="portfolio">
                    <div class="loading"></div>
                </div>
            </div>
            <div class="section-header" style="margin-top:16px">
                <span class="section-title">Filter Validation</span>
            </div>
            <div class="card">
                <div class="card-body" id="filterValidation">
                    <div class="loading"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Open Trades -->
    <div class="section">
        <div class="section-header">
            <span class="section-title">Open Trades</span>
            <span class="section-title c-muted" id="openCount"></span>
        </div>
        <div class="card">
            <div id="openTrades"><div class="loading"></div></div>
        </div>
    </div>

    <!-- Recent Signals -->
    <div class="section">
        <div class="section-header">
            <span class="section-title">Recent Signals</span>
        </div>
        <div class="card">
            <div id="recentSignals"><div class="loading"></div></div>
        </div>
    </div>

    <!-- Scheduler -->
    <div class="section">
        <div class="section-header">
            <span class="section-title">Scheduler</span>
        </div>
        <div class="card">
            <div id="scheduler"><div class="loading"></div></div>
        </div>
    </div>

</div>

<script>
    let equityChart = null;

    async function fetchJSON(url) {
        try {
            const res = await fetch(url);
            return res.json();
        } catch { return null; }
    }

    function pnlClass(val) {
        if (val > 0) return 'c-green';
        if (val < 0) return 'c-red';
        return 'c-muted';
    }

    function formatMoney(val, showSign = false) {
        if (val === null || val === undefined) return '--';
        const abs = Math.abs(val);
        let str;
        if (abs >= 1e6) str = '$' + (abs / 1e6).toFixed(2) + 'M';
        else if (abs >= 1e3) str = '$' + abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        else str = '$' + abs.toFixed(2);
        if (showSign) return (val >= 0 ? '+' : '-') + str;
        if (val < 0) return '-' + str;
        return str;
    }

    function formatPct(val, showSign = false) {
        if (val === null || val === undefined) return '--';
        const prefix = showSign && val >= 0 ? '+' : '';
        return prefix + val.toFixed(1) + '%';
    }

    // ---- Hero ----
    async function loadHero() {
        const d = await fetchJSON('/api/overview');
        if (!d) return;

        document.getElementById('heroBankroll').textContent = formatMoney(d.bankroll);
        document.getElementById('heroBankrollSub').innerHTML =
            `<span class="${pnlClass(d.total_pnl)}">${formatMoney(d.total_pnl, true)}</span> from $100,000`;

        document.getElementById('heroPnl').className = `hero-value ${pnlClass(d.total_pnl)}`;
        document.getElementById('heroPnl').textContent = formatMoney(d.total_pnl, true);
        document.getElementById('heroPnlSub').innerHTML =
            `<span class="${pnlClass(d.roi)}">${formatPct(d.roi, true)} ROI</span>`;

        const wrClass = d.win_rate >= 55 ? 'c-green' : d.win_rate >= 50 ? 'c-orange' : d.win_rate > 0 ? 'c-red' : 'c-muted';
        document.getElementById('heroWinRate').className = `hero-value ${wrClass}`;
        document.getElementById('heroWinRate').textContent = d.settled > 0 ? d.win_rate + '%' : '--';
        document.getElementById('heroWinRateSub').textContent =
            d.settled > 0 ? `${d.wins}W / ${d.losses}L across ${d.settled} trades` : 'No settled trades yet';

        document.getElementById('heroSignals').textContent = d.total_signals;
        document.getElementById('heroSignalsSub').textContent =
            `${d.passed_filter} passed / ${d.filtered_out} filtered / ${d.open} open`;
    }

    // ---- Equity Curve ----
    async function loadEquity() {
        const data = await fetchJSON('/api/equity-curve');
        if (!data) return;

        const canvas = document.getElementById('equityChart');
        const empty = document.getElementById('chartEmpty');

        if (!data.length || data.length < 2) {
            canvas.style.display = 'none';
            empty.style.display = 'flex';
            return;
        }

        canvas.style.display = 'block';
        empty.style.display = 'none';

        const labels = data.map(d => d[0]);
        const values = data.map(d => d[1]);
        const isUp = values[values.length - 1] >= values[0];

        if (equityChart) equityChart.destroy();

        const ctx = canvas.getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 280);
        if (isUp) {
            gradient.addColorStop(0, 'rgba(48, 209, 88, 0.15)');
            gradient.addColorStop(1, 'rgba(48, 209, 88, 0)');
        } else {
            gradient.addColorStop(0, 'rgba(255, 69, 58, 0.15)');
            gradient.addColorStop(1, 'rgba(255, 69, 58, 0)');
        }

        equityChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    data: values,
                    borderColor: isUp ? '#30d158' : '#ff453a',
                    backgroundColor: gradient,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHitRadius: 20,
                    borderWidth: 2,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(20,20,20,0.95)',
                        titleColor: 'rgba(255,255,255,0.5)',
                        bodyColor: '#f5f5f7',
                        bodyFont: { weight: '600', size: 14 },
                        borderColor: 'rgba(255,255,255,0.1)',
                        borderWidth: 1,
                        padding: 12,
                        cornerRadius: 10,
                        displayColors: false,
                        callbacks: {
                            label: ctx => formatMoney(ctx.raw),
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: { color: 'rgba(255,255,255,0.2)', maxTicksLimit: 8, font: { size: 11 } },
                        grid: { display: false },
                        border: { display: false },
                    },
                    y: {
                        position: 'right',
                        ticks: {
                            color: 'rgba(255,255,255,0.2)',
                            font: { size: 11 },
                            callback: v => formatMoney(v),
                            maxTicksLimit: 5,
                        },
                        grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false },
                        border: { display: false },
                    },
                },
            },
        });
    }

    // ---- Strategies ----
    async function loadStrategies() {
        const data = await fetchJSON('/api/strategies');
        const el = document.getElementById('strategies');
        if (!data || !data.length) {
            el.innerHTML = '<div class="empty">No strategy data yet</div>';
            return;
        }
        let html = `<table><thead><tr>
            <th>Strategy</th><th>Signals</th><th>Passed</th><th>Settled</th>
            <th>W</th><th>L</th><th>Win %</th><th>P&L</th>
        </tr></thead><tbody>`;
        for (const s of data) {
            const wrClass = s.win_rate >= 55 ? 'c-green' : s.win_rate >= 50 ? 'c-orange' : s.settled > 0 ? 'c-red' : 'c-muted';
            html += `<tr>
                <td class="cell-ticker" style="text-transform:capitalize">${s.strategy.replace('_', ' ')}</td>
                <td>${s.total}</td><td>${s.passed}</td><td>${s.settled}</td>
                <td>${s.wins}</td><td>${s.losses}</td>
                <td class="${wrClass}">${s.settled > 0 ? s.win_rate + '%' : '--'}</td>
                <td class="${pnlClass(s.pnl)}">${formatMoney(s.pnl, true)}</td>
            </tr>`;
        }
        html += '</tbody></table>';
        el.innerHTML = html;
    }

    // ---- Portfolio ----
    async function loadPortfolio() {
        const d = await fetchJSON('/api/portfolio');
        if (!d) return;
        document.getElementById('portfolio').innerHTML = `
            <div class="stats-grid">
                <div class="stat">
                    <div class="stat-label">Open Positions</div>
                    <div class="stat-value">${d.open_positions} <span class="c-muted" style="font-size:14px;font-weight:400">/ ${d.max_positions}</span></div>
                </div>
                <div class="stat">
                    <div class="stat-label">Exposure</div>
                    <div class="stat-value">${formatMoney(d.total_exposure)}</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Total P&L</div>
                    <div class="stat-value ${pnlClass(d.total_pnl)}">${formatMoney(d.total_pnl, true)}</div>
                </div>
                <div class="stat">
                    <div class="stat-label">ROI</div>
                    <div class="stat-value ${pnlClass(d.roi_pct)}">${formatPct(d.roi_pct, true)}</div>
                </div>
            </div>
        `;
    }

    // ---- Filter Validation ----
    async function loadFilterValidation() {
        const d = await fetchJSON('/api/filter-validation');
        if (!d) return;
        if (d.total_tracked === 0) {
            document.getElementById('filterValidation').innerHTML =
                '<div style="color:var(--text-tertiary);font-size:13px">Tracking filtered signal outcomes to validate filter quality</div>';
            return;
        }
        document.getElementById('filterValidation').innerHTML = `
            <div class="filter-grid">
                <div class="filter-stat">
                    <div class="filter-stat-value">${d.total_tracked}</div>
                    <div class="filter-stat-label">Tracked</div>
                </div>
                <div class="filter-stat">
                    <div class="filter-stat-value c-green">${d.would_have_won}</div>
                    <div class="filter-stat-label">Would've Won</div>
                </div>
                <div class="filter-stat">
                    <div class="filter-stat-value c-red">${d.would_have_lost}</div>
                    <div class="filter-stat-label">Would've Lost</div>
                </div>
            </div>
            <div style="text-align:center;padding:12px 0 4px;font-size:12px;color:var(--text-tertiary)">
                Hypothetical win rate: ${d.hypothetical_win_rate}%
            </div>
        `;
    }

    // ---- Open Trades ----
    async function loadOpenTrades() {
        const data = await fetchJSON('/api/open-trades');
        const el = document.getElementById('openTrades');
        document.getElementById('openCount').textContent = data && data.length ? data.length : '';

        if (!data || !data.length) {
            el.innerHTML = '<div class="empty"><div class="empty-icon"></div>No open positions</div>';
            return;
        }

        let html = `<table><thead><tr>
            <th>Ticker</th><th>Strategy</th><th>Direction</th><th>Confidence</th>
            <th>Entry</th><th>Stop</th><th>Target</th><th>R:R</th><th>Risk</th>
        </tr></thead><tbody>`;
        for (const t of data) {
            const dirBadge = t.direction === 'LONG'
                ? '<span class="badge badge-long">LONG</span>'
                : '<span class="badge badge-short">SHORT</span>';
            html += `<tr>
                <td class="cell-ticker">${t.ticker}</td>
                <td style="text-transform:capitalize">${t.strategy.replace('_',' ')}</td>
                <td>${dirBadge}</td>
                <td>${t.confidence}%</td>
                <td class="cell-mono">$${t.entry_price.toFixed(2)}</td>
                <td class="cell-mono c-red">$${t.stop_loss.toFixed(2)}</td>
                <td class="cell-mono c-green">$${t.take_profit.toFixed(2)}</td>
                <td>${t.rr_ratio.toFixed(2)}</td>
                <td>${t.position_size ? formatMoney(t.position_size) : '--'}</td>
            </tr>`;
        }
        html += '</tbody></table>';
        el.innerHTML = html;
    }

    // ---- Recent Signals ----
    async function loadRecentSignals() {
        const data = await fetchJSON('/api/signals?limit=20');
        const el = document.getElementById('recentSignals');
        if (!data || !data.length) {
            el.innerHTML = '<div class="empty"><div class="empty-icon"></div>No signals generated yet.<br>Run a scan or wait for the next scheduled cycle.</div>';
            return;
        }

        let html = `<table><thead><tr>
            <th>Date</th><th>Ticker</th><th>Strategy</th><th>Direction</th>
            <th>Confidence</th><th>R:R</th><th>Filter</th><th>Status</th><th>P&L</th>
        </tr></thead><tbody>`;
        for (const s of data) {
            const dirBadge = s.direction === 'LONG'
                ? '<span class="badge badge-long">LONG</span>'
                : '<span class="badge badge-short">SHORT</span>';
            const filterBadge = s.passed_filter
                ? '<span class="badge badge-pass">PASS</span>'
                : '<span class="badge badge-no">SKIP</span>';
            const statusBadge = `<span class="badge badge-${s.status}">${s.status.toUpperCase()}</span>`;
            const pnl = s.real_pnl !== null
                ? `<span class="${pnlClass(s.real_pnl)}">${formatMoney(s.real_pnl, true)}</span>`
                : '<span class="c-muted">--</span>';

            html += `<tr>
                <td class="c-muted">${(s.created_at || '').slice(0, 10)}</td>
                <td class="cell-ticker">${s.ticker}</td>
                <td style="text-transform:capitalize">${s.strategy.replace('_',' ')}</td>
                <td>${dirBadge}</td>
                <td>${s.confidence}%</td>
                <td>${s.rr_ratio.toFixed(2)}</td>
                <td>${filterBadge}</td>
                <td>${statusBadge}</td>
                <td>${pnl}</td>
            </tr>`;
        }
        html += '</tbody></table>';
        el.innerHTML = html;
    }

    // ---- Scheduler ----
    async function loadScheduler() {
        const jobs = await fetchJSON('/api/scheduler/status');
        const el = document.getElementById('scheduler');
        if (!jobs || !jobs.length) {
            el.innerHTML = '<div class="empty">Scheduler not running</div>';
            return;
        }
        let html = '<div class="scheduler-grid">';
        for (const j of jobs) {
            const nextStr = j.next_run
                ? new Date(j.next_run).toLocaleString('en-US', { weekday: 'short', hour: 'numeric', minute: '2-digit', hour12: true, timeZoneName: 'short' })
                : 'Not scheduled';
            html += `<div class="sched-pill">
                <div class="sched-dot"></div>
                <div class="sched-info">
                    <div class="sched-name">${j.name}</div>
                    <div class="sched-next">Next: ${nextStr}</div>
                </div>
            </div>`;
        }
        html += '</div>';
        el.innerHTML = html;
    }

    // ---- Actions ----
    async function triggerScan() {
        const btn = document.getElementById('scanBtn');
        btn.disabled = true;
        btn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6" stroke-dasharray="3 3"><animateTransform attributeName="transform" type="rotate" values="0 8 8;360 8 8" dur="1s" repeatCount="indefinite"/></circle></svg> Scanning...';
        await fetch('/api/scan/trigger', { method: 'POST' });
        setTimeout(() => {
            btn.disabled = false;
            btn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14"/></svg> Scan Now';
            refreshAll();
        }, 8000);
    }

    async function triggerSettle() {
        const btn = document.getElementById('settleBtn');
        btn.disabled = true;
        btn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6" stroke-dasharray="3 3"><animateTransform attributeName="transform" type="rotate" values="0 8 8;360 8 8" dur="1s" repeatCount="indefinite"/></circle></svg> Settling...';
        await fetch('/api/settle/trigger', { method: 'POST' });
        setTimeout(() => {
            btn.disabled = false;
            btn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8h12M8 2v12"/></svg> Settle';
            refreshAll();
        }, 4000);
    }

    // ---- Refresh ----
    async function refreshAll() {
        await Promise.all([
            loadHero(),
            loadEquity(),
            loadStrategies(),
            loadPortfolio(),
            loadFilterValidation(),
            loadOpenTrades(),
            loadRecentSignals(),
            loadScheduler(),
        ]);
        const now = new Date();
        document.getElementById('lastRefresh').textContent =
            now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' });
    }

    refreshAll();
    setInterval(refreshAll, 60000);
</script>
</body>
</html>
