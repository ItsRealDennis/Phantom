<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/sidebar.css">
    <link rel="stylesheet" href="/static/css/pages.css">
</head>
<body>

<div class="app-shell">

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span class="sidebar-logo-text">Phantom</span>
        </div>

        <div class="sidebar-nav">
            <a class="sidebar-link active" data-route="/" onclick="Router.navigate('#/')">
                <div class="sidebar-link-icon">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                </div>
                <span class="sidebar-link-label">Overview</span>
            </a>
            <a class="sidebar-link" data-route="/trades" onclick="Router.navigate('#/trades')">
                <div class="sidebar-link-icon">
                    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                </div>
                <span class="sidebar-link-label">Trade Journal</span>
            </a>
            <a class="sidebar-link" data-route="/strategies" onclick="Router.navigate('#/strategies')">
                <div class="sidebar-link-icon">
                    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                </div>
                <span class="sidebar-link-label">Strategies</span>
            </a>
            <a class="sidebar-link" data-route="/risk" onclick="Router.navigate('#/risk')">
                <div class="sidebar-link-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <span class="sidebar-link-label">Risk</span>
            </a>

            <div class="sidebar-divider"></div>

            <a class="sidebar-link" data-route="/settings" onclick="Router.navigate('#/settings')">
                <div class="sidebar-link-icon">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </div>
                <span class="sidebar-link-label">System</span>
            </a>
        </div>
    </nav>

    <!-- Topbar -->
    <header class="topbar">
        <div class="topbar-inner">
            <span class="topbar-title" id="pageTitle">Overview</span>
            <div class="topbar-actions">
                <span class="topbar-status" id="alpacaStatus"></span>
                <span class="topbar-status">
                    <span class="topbar-dot"></span>
                    <span id="lastRefresh">Live</span>
                </span>
                <button class="btn btn-sm" onclick="handleRefresh()" title="Refresh">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 8a7 7 0 0 1 13.2-3.2M15 8a7 7 0 0 1-13.2 3.2"/><polyline points="1 3 1 8 6 8" stroke-width="1.5" fill="none"/><polyline points="15 13 15 8 10 8" stroke-width="1.5" fill="none"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main class="main-content">
        <div class="page-container" id="app">
            <div class="loading"></div>
        </div>
    </main>

</div>

<!-- Bottom tab bar (mobile) -->
<nav class="bottom-tabs">
    <a class="bottom-tab active" data-route="/" onclick="Router.navigate('#/')">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span class="bottom-tab-label">Overview</span>
    </a>
    <a class="bottom-tab" data-route="/trades" onclick="Router.navigate('#/trades')">
        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span class="bottom-tab-label">Trades</span>
    </a>
    <a class="bottom-tab" data-route="/strategies" onclick="Router.navigate('#/strategies')">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span class="bottom-tab-label">Strategies</span>
    </a>
    <a class="bottom-tab" data-route="/risk" onclick="Router.navigate('#/risk')">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span class="bottom-tab-label">Risk</span>
    </a>
    <a class="bottom-tab" data-route="/settings" onclick="Router.navigate('#/settings')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span class="bottom-tab-label">System</span>
    </a>
</nav>

<!-- Toast container -->
<div id="toastContainer" class="toast-container"></div>

<!-- Scripts (v=2 cache bust for Phase 2) -->
<script src="/static/js/utils.js?v=4"></script>
<script src="/static/js/api.js?v=4"></script>
<script src="/static/js/router.js?v=4"></script>
<script src="/static/js/charts.js?v=4"></script>
<script src="/static/js/components.js?v=4"></script>
<script src="/static/js/pages/overview.js?v=4"></script>
<script src="/static/js/pages/trades.js?v=4"></script>
<script src="/static/js/pages/trade-detail.js?v=4"></script>
<script src="/static/js/pages/strategies.js?v=4"></script>
<script src="/static/js/pages/risk.js?v=4"></script>
<script src="/static/js/pages/settings.js?v=4"></script>
<script src="/static/js/app.js?v=4"></script>

</body>
</html>
